<!DOCTYPE html>
<html>
<head>
    <title>待辦清單</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 400px;
            margin: 40px auto;
        }

        #list div {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        input {
            width: 100%;
            padding: 10px;
            padding-left: 1px;
            margin-top: 12px;
            border: none;
            outline: none;
            border-bottom: 1px solid #eee;
            font-size: 18px;
        }

        button {
            border: none;
            background: none;
            cursor: pointer;
            color: #aaa;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <h1>待辦事項</h1>
    <div id="list"></div>
    <input id="addInput" placeholder="+" />

    <script>
        var items = [
            { text: "切版作業bootstrap", done: false },
            { text: "代辦清單作業", done: true },
        ];

        function update() {
            var list = document.getElementById("list");
            list.innerHTML = "";

            items.forEach(function(item, i) {
                var row = document.createElement("div");

                var circle = document.createElement("span");
                circle.textContent = item.done ? "☑" : "☐";
                circle.style.fontSize = "22px";
                circle.style.cursor = "pointer";
                circle.onclick = function() {
                    items[i].done = !items[i].done;
                    update();
                };

                var txt = document.createElement("span"); //span會再同一行
                txt.textContent = item.text;
                txt.style.textDecoration = item.done ? "line-through" :         "none";


                var del = document.createElement("button");
                del.textContent = "×";
                del.onclick = function() {
                    items.splice(i, 1);
                    update();
                };

                row.appendChild(circle);
                row.appendChild(txt);
                row.appendChild(del);

                list.appendChild(row);
            });
        }

        update();

        document.getElementById("addInput").addEventListener("keydown", function(e) {
            if (e.key === "Enter" && this.value.trim() !== "") {
                items.push({ text: this.value.trim(), done: false });
                this.value = "";
                update();
            }
        });
        
    </script>

</body>
</html>
